name: Sanity Backup Daily

# Disaster Recovery dual-layer pro CMS Sanity:
# - N1: backup-sanity.mjs gera JSON completo do dataset → docs/sanity-backups/
# - N2: sanity-to-mdx.mjs sincroniza MDX local + baixa imagens
#
# Resultado: se Sanity sumir, o repositório Git tem TODO o conteúdo
# pronto pra ser servido via dual-read fallback (MDX legacy) sem perda.
#
# Doc: docs/architecture/sanity-disaster-recovery.md

on:
  schedule:
    # 04:00 BRT = 07:00 UTC (1h depois do CRM snapshot)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      sync_mdx:
        description: "Rodar sync reverso pra MDX (mantém content/blog atualizado)?"
        type: boolean
        default: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Backup Sanity dataset (N1)
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        run: node scripts/backup-sanity.mjs

      - name: Sync Sanity → MDX (N2)
        if: ${{ inputs.sync_mdx != false }}
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        run: node scripts/sanity-to-mdx.mjs

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Adiciona apenas paths de backup/sync (NÃO mexe em outros)
          git add docs/sanity-backups/ content/blog/ public/blog/ 2>/dev/null || true

          if [ -n "$(git status --porcelain)" ]; then
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "chore(backup): Sanity sync $DATE [skip ci]"
            git push
          else
            echo "Nenhuma mudança detectada — skipping commit."
          fi
