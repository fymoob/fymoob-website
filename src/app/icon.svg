<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="geometricPrecision">
  <!-- Fundo: quadrado arredondado no azul FYMOOB #29ABE2 -->
  <rect width="512" height="512" rx="104" ry="104" fill="#29ABE2"/>
  <!--
    "fy" em paths fechados — sem dependencia de fonte instalada.
    Geometria limpa estilo sans-serif geometrico (Poppins/Inter inspired):
    - f: stem vertical + hook superior com arco circular + crossbar
    - y: duas diagonais convergentes + descender com cauda arredondada
    Padding 128 no viewbox 512 = 25% safe area (Google SERP trunca ~10%,
    Apple ~15%; 25% garante nunca cortar nenhum detalhe da marca).
  -->
  <g fill="#ffffff">
    <!-- f: hook superior (arco) + stem + crossbar em um path unico -->
    <path d="M 278 132
             L 278 182
             L 244 182
             Q 226 182 226 200
             L 226 220
             L 282 220
             L 282 272
             L 226 272
             L 226 400
             L 168 400
             L 168 272
             L 132 272
             L 132 220
             L 168 220
             L 168 182
             Q 168 132 218 132
             Z"/>
    <!-- y: V superior + stem direito que desce + cauda arredondada -->
    <path d="M 302 220
             L 358 220
             L 395 340
             L 415 340
             L 440 220
             L 496 220
             L 430 420
             Q 418 450 384 450
             L 340 450
             L 340 400
             L 366 400
             Q 378 400 382 388
             L 388 370
             L 302 220
             Z"/>
  </g>
</svg>
