<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="geometricPrecision">
  <!-- Fundo: quadrado arredondado no azul FYMOOB #29ABE2 -->
  <rect width="512" height="512" rx="104" ry="104" fill="#29ABE2"/>
  <!--
    "fy" v2 (centralizado + y refinado, Bruno 19/04):
    - Shift geral pra esquerda pra centrar exatamente em 512x512
      (viewport center = 256, "fy" agora span 74-438 = centro 256)
    - y com curvas cubicas (C) em vez de quadraticas (Q) pra tail mais
      suave e orgânica
    - V do y com ponto mais afiado (gap de 4 em vez de 20 no meeting)
  -->
  <g fill="#ffffff">
    <!-- f: stem + hook superior + crossbar, centralizado horizontalmente -->
    <path d="M 218 120
             L 218 174
             L 184 174
             Q 168 174 168 192
             L 168 212
             L 224 212
             L 224 266
             L 168 266
             L 168 400
             L 110 400
             L 110 266
             L 74 266
             L 74 212
             L 110 212
             L 110 174
             Q 110 120 158 120
             Z"/>
    <!-- y: duas diagonais afiladas + descender com tail curvado suave -->
    <path d="M 246 212
             L 302 212
             L 344 342
             L 348 342
             L 382 212
             L 438 212
             L 374 420
             C 364 442 348 452 326 452
             L 274 452
             L 274 398
             L 304 398
             Q 314 398 318 388
             L 322 370
             L 246 212
             Z"/>
  </g>
</svg>
